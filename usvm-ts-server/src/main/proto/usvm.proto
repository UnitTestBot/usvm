syntax = "proto3";
package usvm;

option java_multiple_files = true;

import "manager.proto";
import "greeter.proto";
import "type_inference.proto";

service UsvmService {
  rpc SayHello(greeter.HelloRequest) returns (greeter.HelloReply);
  rpc InferTypes(infer.InferTypesRequest) returns (infer.InferredTypes);
}
